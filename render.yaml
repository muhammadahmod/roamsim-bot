services:
  - type: web
    name: roamsim-bot
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Secrets / sensitive values — Render will prompt you to enter these at
      # deploy time. They are NOT stored in this (public) repo.
      - key: ADMIN_WHATSAPP
        sync: false   # e.g. whatsapp:+27832001327
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false   # e.g. whatsapp:+1415XXXXXXX (your Twilio WhatsApp sender)
      - key: PAYMENT_LINK
        sync: false   # leave blank until Paystack is activated
